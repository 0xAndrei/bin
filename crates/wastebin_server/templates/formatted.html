{% extends "paste.html" %}

{% block content %}
  <article class="markdown-body">
    {{ html|safe }}
  </article>
  {% if !is_available %}
  <div id="burn-message" hidden data-message="{{ lang.t("paste.toast.burned") }}"></div>
  <script defer src="{{ page.assets.burn_js.route()}}"></script>
  {% endif %}
{% endblock %}
