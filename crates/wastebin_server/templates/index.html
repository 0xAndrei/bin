{% extends "base.html" %}

{% block head %}
<script defer src="{{ page.assets.index_js.route() }}"></script>
{% endblock %}

{% block body %}
<form id="form" action="/new" method="post">
  <header class="site-header">
    <a class="brand" href="/">x0.ax</a>
    <nav class="site-nav">
      <a href="/">new</a>
      <a href="/how">how</a>
      <a href="/langs">langs</a>
    </nav>
  </header>

  <main class="rentry-shell">
    <nav class="editor-tabs" aria-label="editor tabs">
      <button class="tab-button active" type="button" data-tab="text">Text</button>
      <button class="tab-button" type="button" data-tab="preview">Preview</button>
      <a class="tab-link" href="/how">How</a>
    </nav>

    <section class="tab-panel active" id="tab-text">
      <div class="editor-card" id="editor-wrap">
        <textarea id="text" name="text" autocapitalize="off" autocorrect="off" autocomplete="off" spellcheck="false" placeholder="Markdown text goes here..." autofocus required></textarea>
        <div class="drop-overlay" id="drop-overlay">
          <div>
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
            <div class="drop-overlay-text">{{ lang.t("index.drop") }}</div>
          </div>
        </div>
      </div>
    </section>

    <section class="tab-panel" id="tab-preview">
      <article id="preview" class="preview-pane markdown-body"></article>
    </section>

    <section class="form-grid">
      <label>
        <span>Url</span>
        <div class="url-input-wrap">
          <span>x0.ax/</span>
          <input type="text" name="path" id="path" class="input-base" placeholder="custom" pattern="[A-Za-z0-9_-]{3,64}" maxlength="64">
        </div>
      </label>
      <label>
        <span>Edit code</span>
        <input type="password" name="password" id="password" class="input-base" placeholder="optional">
      </label>
      <label class="wide">
        <span>Title</span>
        <input type="text" name="title" id="title" class="input-base" placeholder="optional">
      </label>
    </section>

    <section class="form-options">
      <div class="expiry-list" id="expiry-list">
        {% for expiration in page.expirations %}
        <label class="expiry-btn">
          <input type="radio" name="expires" value="{{ expiration.duration.as_secs() }}" {% if expiration.default %}checked{% endif %}>
          <span>{{ expiration }}</span>
        </label>
        {% endfor %}
      </div>
      <label class="inline-check">
        <input type="checkbox" name="burn-after-reading" id="burn-after-reading">
        <span>burn after reading</span>
      </label>
    </section>

    <footer class="editor-footer">
      <div class="stats" id="stats" data-max-bytes="{{ page.max_body_size }}" data-unit-kb="{{ lang.t("stats.unit.kb") }}" data-unit-mb="{{ lang.t("stats.unit.mb") }}" data-label-limit="{{ lang.t("stats.label.limit") }}">
        <span><strong id="stat-lines">0</strong> lines</span>
        <span><strong id="stat-chars">0</strong> chars</span>
        <span><strong id="stat-bytes">0</strong> bytes</span>
        <span id="progress-kb">0.0 {{ lang.t("stats.unit.kb") }}</span>
        <span id="progress-limit"></span>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
      <button type="button" id="open" class="secondary-btn">upload file</button>
      <button type="submit" title="{{ lang.t("index.button.paste") }}" class="paste-btn">publish</button>
    </footer>
  </main>
</form>
{% endblock %}
